name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Test Backend (Validation)
        run: |
          echo "Construction de l'image de test..."
          docker build -t test-backend ./backend/
          echo "Vérification que le conteneur démarre sans crasher..."
          docker run -d --name backend-test test-backend
          sleep 5
          docker rm -f backend-test

      - name: Build & Test Frontend (Validation)
        run: |
          echo "Construction de l'image de test..."
          docker build -t test-frontend ./frontend/
          echo "Vérification que le conteneur démarre sans crasher..."
          docker run -d --name frontend-test test-frontend
          sleep 5
          docker rm -f frontend-test

      # 4. PUSH VERS LE REGISTRY (Si les tests sont OK)
      # On utilise un tag unique basé sur le SHA du commit pour le versionnement
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/matthis323/backend-app:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/matthis323/frontend-app:${{ github.sha }}