name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- BUILD ---
      - name: Build Backend Image
        run: docker build -t backend-image:latest ./backend/

      - name: Build Frontend Image
        run: docker build -t frontend-image:latest ./frontend/

      # --- SCAN DE SÉCURITÉ (TRIVY) ---
      - name: Scan Backend Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'backend-image:latest'
          format: 'table'
          # On bloque le pipeline uniquement si Trivy trouve des failles "CRITICAL"
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Scan Frontend Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend-image:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      # --- PUSH (Uniquement si les scans sont OK) ---
      - name: Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/matthis323/backend-app:${{ github.sha }}

      - name: Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/matthis323/frontend-app:${{ github.sha }}